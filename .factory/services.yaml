commands:
  install: pnpm install
  typecheck: pnpm typecheck
  build: pnpm tauri build
  test: pnpm test
  test-rust: cd src-tauri && cargo test
  lint: pnpm lint
  clippy: cd src-tauri && cargo clippy -- -D warnings

services:
  tauri-dev:
    start: pnpm tauri dev
    stop: lsof -ti :24200 | xargs kill 2>/dev/null; lsof -ti :24201 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:24200
    port: 24200
    depends_on: []
